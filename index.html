<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WSA Scanner</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f172a,#020617);
    color:white;
    text-align:center;
}

/* HEADER */
header{
    padding:20px;
    font-size:22px;
    font-weight:600;
}

/* CARD */
.container{
    margin:20px;
    padding:20px;
    border-radius:20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* VIDEO */
.video-wrapper{
    position:relative;
    display:inline-block;
}

video{
    width:100%;
    max-width:420px;
    border-radius:15px;
}

/* SCAN LINE */
.scan-line{
    position:absolute;
    width:80%;
    height:2px;
    background:#ff0000;
    left:10%;
    animation:scan 2s infinite;
}

@keyframes scan{
    0%{top:20%;}
    50%{top:80%;}
    100%{top:20%;}
}

/* BUTTON */
button{
    margin-top:20px;
    padding:14px 25px;
    border:none;
    border-radius:12px;
    background: linear-gradient(135deg,#3b82f6,#06b6d4);
    color:white;
    font-size:16px;
    font-weight:600;
}

/* RESULT */
#result{
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
    padding:10px;
}
</style>
</head>

<body>

<header>WSA Scanner ⚡</header>

<div class="container">

    <div class="video-wrapper">
        <video id="video" autoplay></video>
        <div class="scan-line"></div>
    </div>

    <br>

    <button onclick="startScanner()">Scanner</button>

    <div id="result">En attente...</div>

</div>

<script>
const codeReader = new ZXing.BrowserMultiFormatReader();

let lastResult = null;
let scanLock = false;

async function startScanner(){
    try{
        const devices = await codeReader.listVideoInputDevices();
        const deviceId = devices[devices.length - 1].deviceId;

        codeReader.decodeFromVideoDevice(deviceId, 'video', (result, err) => {

            if(result && !scanLock){

                if(result.text !== lastResult){

                    scanLock = true;
                    lastResult = result.text;

                    document.getElementById("result").innerText = "Code : " + result.text;

                    if(navigator.vibrate){
                        navigator.vibrate(100);
                    }

                    setTimeout(()=>{
                        scanLock = false;
                    },1200);
                }
            }

        });

    }catch(e){
        alert("Erreur caméra");
    }
}
</script>

</body>
</html>
