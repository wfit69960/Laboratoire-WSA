<title>Laboratoire WSA — Analyse de produits</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  :root {
    --bg: #ffffff;
    --bg-2: #ffffff;
    --bg-3: #ffffff;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.08);
    --border-2: rgba(0,0,0,0.12);
    --border-3: rgba(0,0,0,0.18);
    --border-glow: rgba(85,168,69,0.18);
    --text: #1a1a1a;
    --text-2: #6b6b6b;
    --text-3: #a3a3a3;
    --accent: #1a1a1a;
    --signal: #55a845;
    --signal-2: #4a9839;
    --signal-deep: #3d8030;
    --signal-soft: #eaf6e7;
    --orange: #f59e0b;
    --orange-soft: #fff4e0;
    --grade-a: #55a845;
    --grade-b: #88c057;
    --grade-c: #f59e0b;
    --grade-d: #ef6c00;
    --grade-e: #d32f2f;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow: 0 4px 12px rgba(0,0,0,0.05), 0 1px 3px rgba(0,0,0,0.06);
    --shadow-lg: 0 12px 32px -8px rgba(0,0,0,0.12);
    --shadow-blue: 0 12px 32px -8px rgba(85,168,69,0.3);
  }
  
  html, body { 
    color-scheme: light only;
    -webkit-text-size-adjust: 100%;
    background: #ffffff !important;
  }
  
  body {
    background: #ffffff !important;
    color: #1a1a1a;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    overscroll-behavior: none;
    line-height: 1.5;
    font-feature-settings: 'ss01', 'cv11';
  }
  
  body::before {
    content: none;
  }
  
  body::after {
    content: none;
  }
  
  .app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    position: relative;
    z-index: 1;
    padding-bottom: 100px;
  }
  
  /* HEADER */
  .header {
    padding: 24px 24px 16px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  
  .brand-mark {
    width: 40px;
    height: 40px;
    background: var(--text);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 22px;
    line-height: 1;
    position: relative;
    color: white;
    box-shadow: var(--shadow-sm);
  }
  
  .brand-mark::after {
    content: '';
    position: absolute;
    top: -1px;
    right: -1px;
    width: 9px;
    height: 9px;
    background: var(--signal);
    border-radius: 50%;
    border: 2px solid var(--bg);
  }
  
  .brand-text {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  
  .brand-name {
    font-family: 'Instrument Serif', serif;
    font-size: 20px;
    line-height: 1;
    letter-spacing: -0.01em;
  }
  
  .brand-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--text-3);
  }
  
  .header-meta {
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-3);
    line-height: 1.5;
  }
  
  .header-meta .live {
    color: var(--signal);
  }
  
  /* HOME */
  .home {
    padding: 0 24px 40px;
  }
  
  .hero {
    margin-bottom: 32px;
  }
  
  .hero-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--text-2);
    margin-bottom: 22px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  
  .hero-eyebrow-dot {
    width: 6px;
    height: 6px;
    background: var(--signal);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--signal), 0 0 4px var(--signal);
    animation: pulse 2s ease-in-out infinite;
  }
  
  .hero-tagline {
    font-family: 'Instrument Serif', serif;
    font-size: 30px;
    line-height: 1.15;
    letter-spacing: -0.015em;
    color: var(--text);
    margin-bottom: 28px;
    max-width: 360px;
  }
  
  .hero-tagline em {
    font-style: italic;
    color: var(--signal);
  }
  
  .hero-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }
  
  .hero-stat {
    padding: 18px 14px;
    text-align: left;
    border-right: 1px solid var(--border);
  }
  
  .hero-stat:last-child {
    border-right: none;
  }
  
  .hero-stat-num {
    font-family: 'Instrument Serif', serif;
    font-size: 28px;
    line-height: 1;
    color: var(--text);
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }
  
  .hero-stat-lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--text-3);
    line-height: 1.4;
  }
  
  /* SCAN BUTTON - le seul bouton */
  .scan-orb {
    position: relative;
    margin: 0 auto 28px;
    width: 100%;
    background: var(--text);
    border: none;
    border-radius: 24px;
    padding: 30px 28px;
    cursor: pointer;
    overflow: hidden;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: block;
    text-align: left;
    color: white;
    font-family: inherit;
    box-shadow: var(--shadow-lg);
  }
  
  .scan-orb::before {
    content: '';
    position: absolute;
    top: -1px;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  }
  
  .scan-orb::after {
    content: '';
    position: absolute;
    bottom: -120px;
    right: -60px;
    width: 280px;
    height: 280px;
    background: radial-gradient(circle, var(--signal), transparent 60%);
    opacity: 0.35;
    filter: blur(40px);
    pointer-events: none;
    animation: float 6s ease-in-out infinite;
  }
  
  @keyframes float {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(-20px, -20px) scale(1.1); }
  }
  
  .scan-orb:active {
    transform: scale(0.98);
  }
  
  .scan-orb-content {
    display: flex;
    align-items: center;
    gap: 18px;
    position: relative;
  }
  
  .scan-target-icon {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
    background: rgba(255,255,255,0.05);
  }
  
  .scan-target-icon::before {
    content: '';
    position: absolute;
    inset: 0;
    border: 1.5px solid var(--signal);
    border-radius: 50%;
    animation: ringPulse 2.5s ease-out infinite;
  }
  
  .scan-target-icon::after {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(96,165,250,0.5);
    border-radius: 50%;
  }
  
  @keyframes ringPulse {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(1.4); opacity: 0; }
  }
  
  .scan-target-inner {
    width: 10px;
    height: 10px;
    background: var(--signal);
    border-radius: 50%;
    box-shadow: 
      0 0 16px rgba(96,165,250,0.8),
      0 0 4px white;
    z-index: 2;
  }
  
  .scan-target-cross {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  
  .scan-target-cross::before,
  .scan-target-cross::after {
    content: '';
    position: absolute;
    background: linear-gradient(var(--dir, 90deg), transparent, var(--signal), transparent);
    opacity: 0.5;
  }
  
  .scan-target-cross::before {
    top: 50%;
    left: -8px;
    right: -8px;
    height: 1px;
    transform: translateY(-50%);
  }
  
  .scan-target-cross::after {
    left: 50%;
    top: -8px;
    bottom: -8px;
    width: 1px;
    transform: translateX(-50%);
  }
  
  .scan-orb-label {
    flex: 1;
  }
  
  .scan-orb-label h2 {
    font-family: 'Instrument Serif', serif;
    font-size: 26px;
    font-weight: 400;
    line-height: 1.05;
    margin-bottom: 6px;
    letter-spacing: -0.015em;
    color: white;
  }
  
  .scan-orb-label h2 em {
    font-style: italic;
    color: var(--signal);
  }
  
  .scan-orb-label p {
    font-size: 10.5px;
    color: rgba(255,255,255,0.5);
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  
  .scan-orb-label p::before {
    content: '';
    width: 4px;
    height: 4px;
    background: var(--signal);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--signal);
  }
  
  .scan-orb-arrow {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: white;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    font-weight: 700;
  }
  
  /* MANUAL */
  .divider {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 24px 0 16px;
  }
  
  .divider::before,
  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  
  .divider span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--text-3);
  }
  
  .manual-wrap {
    display: flex;
    gap: 8px;
  }
  
  .manual-input {
    flex: 1;
    background: var(--bg-2);
    border: 1px solid var(--border-2);
    border-radius: 14px;
    padding: 16px 18px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: all 0.2s;
    box-shadow: var(--shadow-sm);
  }
  
  .manual-input::placeholder {
    color: var(--text-3);
  }
  
  .manual-input:focus {
    border-color: var(--signal);
    box-shadow: 0 0 0 4px var(--signal-soft);
  }
  
  .manual-btn {
    background: var(--text);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 0 22px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  
  .manual-btn:active {
    transform: scale(0.97);
  }
  
  /* SUPPORT */
  .support-strip {
    margin-top: 32px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 18px;
    box-shadow: var(--shadow-sm);
  }
  
  .support-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--text-3);
    margin-bottom: 14px;
  }
  
  .support-row {
    display: flex;
    gap: 8px;
  }
  
  .support-chip {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 8px;
    text-align: center;
    font-size: 11px;
    color: var(--text-2);
    font-weight: 500;
  }
  
  .support-chip-icon {
    font-size: 20px;
    margin-bottom: 6px;
    display: block;
  }
  
  /* HISTORY */
  .history-section {
    margin-top: 36px;
  }
  
  .section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  
  .section-head h3 {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    font-weight: 400;
    letter-spacing: -0.01em;
  }
  
  .section-head span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }
  
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  
  .history-item {
    background: white;
    border: none;
    border-radius: 0;
    padding: 14px 0;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: none;
    border-bottom: 1px solid var(--border);
  }
  
  .history-item:last-child {
    border-bottom: none;
  }
  
  .history-item:active {
    opacity: 0.6;
  }
  
  .history-img {
    width: 48px;
    height: 48px;
    border-radius: 10px;
    background: var(--bg-3);
    flex-shrink: 0;
    object-fit: cover;
    border: 1px solid var(--border);
  }
  
  .history-img-ph {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }
  
  .history-info {
    flex: 1;
    min-width: 0;
  }
  
  .history-name {
    font-weight: 600;
    font-size: 15px;
    color: var(--text);
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  
  .history-meta {
    font-size: 12px;
    color: var(--text-3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  
  .history-grade {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    background: transparent !important;
    color: var(--text) !important;
    padding: 0;
  }
  
  .hg-num {
    font-family: 'Inter', sans-serif;
    font-style: normal;
    font-weight: 700;
    font-size: 17px;
    line-height: 1;
    color: var(--text);
  }
  
  .hg-max {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: var(--text-3);
    font-weight: 500;
  }
  
  .hg-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }
  
  .empty {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-3);
    font-size: 14px;
    background: transparent;
    border: none;
    border-radius: 0;
  }
  
  .empty-icon {
    font-size: 32px;
    display: block;
    margin-bottom: 12px;
    opacity: 0.4;
  }
  
  /* SCANNER OVERLAY */
  .scanner {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 100;
    display: none;
    flex-direction: column;
  }
  
  .scanner.active { display: flex; }
  
  #scanner-video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    background: #000;
  }
  
  .scanner-ui {
    position: absolute;
    inset: 0;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    z-index: 2;
  }
  
  .scanner-top {
    padding: 20px 24px;
    background: linear-gradient(180deg, rgba(0,0,0,0.85), transparent);
    display: flex;
    justify-content: space-between;
    align-items: center;
    pointer-events: auto;
  }
  
  .close-x {
    width: 44px;
    height: 44px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    color: white;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .scan-status {
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 8px 14px;
    border-radius: 100px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: white;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .pulse {
    width: 6px;
    height: 6px;
    background: var(--signal);
    border-radius: 50%;
    animation: pulse 1.4s ease-in-out infinite;
    box-shadow: 0 0 8px var(--signal);
  }
  
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(0.6); }
  }
  
  .scanner-frame {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .target {
    width: 280px;
    height: 180px;
    position: relative;
  }
  
  .corner {
    position: absolute;
    width: 28px;
    height: 28px;
    border: 2.5px solid var(--signal);
  }
  
  .corner.tl { top: 0; left: 0; border-right: none; border-bottom: none; }
  .corner.tr { top: 0; right: 0; border-left: none; border-bottom: none; }
  .corner.bl { bottom: 0; left: 0; border-right: none; border-top: none; }
  .corner.br { bottom: 0; right: 0; border-left: none; border-top: none; }
  
  .scan-line {
    position: absolute;
    left: 5%;
    right: 5%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--signal), transparent);
    box-shadow: 0 0 16px var(--signal);
    animation: scan 2.2s ease-in-out infinite;
  }
  
  @keyframes scan {
    0%, 100% { top: 10%; opacity: 0.5; }
    50% { top: 90%; opacity: 1; }
  }
  
  .scanner-bottom {
    padding: 28px 24px 36px;
    background: linear-gradient(0deg, rgba(0,0,0,0.85), transparent);
    text-align: center;
    pointer-events: auto;
  }
  
  .scanner-hint {
    color: rgba(255,255,255,0.95);
    font-size: 14px;
    line-height: 1.4;
  }
  
  .scanner-hint strong {
    color: white;
    display: block;
    font-size: 16px;
    margin-bottom: 4px;
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: 20px;
  }
  
  /* RESULT PAGE */
  .result {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 90;
    overflow-y: auto;
    display: none;
  }
  
  .result.active { display: block; }
  
  .result-head {
    position: sticky;
    top: 0;
    background: rgba(250,250,250,0.85);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 10;
  }
  
  .back {
    width: 38px;
    height: 38px;
    background: var(--bg-2);
    border: 1px solid var(--border-2);
    border-radius: 12px;
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow-sm);
    transition: all 0.2s;
  }
  
  .back:active { transform: scale(0.95); }
  
  .result-title {
    flex: 1;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }
  
  .result-body {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 20px 100px;
  }
  
  /* PRODUCT IDENTITY */
  .identity {
    display: flex;
    gap: 18px;
    margin-bottom: 28px;
  }
  
  .id-img {
    width: 110px;
    height: 110px;
    border-radius: 18px;
    background: white;
    object-fit: contain;
    padding: 8px;
    flex-shrink: 0;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }
  
  .id-img-ph {
    width: 110px;
    height: 110px;
    border-radius: 18px;
    background: var(--bg-3);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    flex-shrink: 0;
  }
  
  .id-meta { flex: 1; min-width: 0; padding-top: 4px; }
  
  .id-cat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--signal);
    margin-bottom: 8px;
  }
  
  .id-name {
    font-family: 'Instrument Serif', serif;
    font-size: 24px;
    line-height: 1.15;
    letter-spacing: -0.01em;
    margin-bottom: 6px;
  }
  
  .id-brand {
    font-size: 13px;
    color: var(--text-2);
  }
  
  .id-quantity {
    font-size: 11px;
    color: var(--text-3);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 6px;
  }
  
  /* VERDICT MAIN */
  .verdict {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 24px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  
  .verdict::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--vc);
  }
  
  .verdict-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 22px;
    position: relative;
  }
  
  .verdict-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--text-3);
    margin-bottom: 6px;
  }
  
  .verdict-stamp {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-3);
    border: 1px solid var(--border-2);
    padding: 4px 8px;
    border-radius: 6px;
    background: var(--bg-3);
  }
  
  /* NOTE SUR 20 - centrale et imposante */
  .note-block {
    text-align: center;
    padding: 8px 0 20px;
    margin-bottom: 22px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  
  .note-pill {
    display: inline-flex;
    align-items: baseline;
    gap: 6px;
    background: var(--bg-3);
    border: 1px solid var(--border-2);
    border-radius: 100px;
    padding: 6px 14px;
    margin-bottom: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--text-2);
  }
  
  .note-pill-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--vc);
  }
  
  .note-display {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 4px;
  }
  
  .note-value {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 88px;
    line-height: 0.85;
    letter-spacing: -0.04em;
    color: var(--vc);
    font-weight: 500;
  }
  
  .note-divider {
    font-family: 'Instrument Serif', serif;
    font-size: 38px;
    color: var(--text-3);
    line-height: 1;
    font-weight: 300;
    margin: 0 2px;
  }
  
  .note-max {
    font-family: 'Instrument Serif', serif;
    font-size: 38px;
    color: var(--text-3);
    line-height: 1;
    font-weight: 400;
  }
  
  .note-stars {
    display: flex;
    justify-content: center;
    gap: 3px;
    margin-top: 14px;
  }
  
  .note-star {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    background: var(--bg-3);
    border: 1px solid var(--border);
  }
  
  .note-star.filled {
    background: var(--vc);
    border-color: var(--vc);
  }
  
  .verdict-display {
    display: flex;
    align-items: center;
    gap: 18px;
    position: relative;
  }
  
  .grade-badge {
    width: 80px;
    height: 80px;
    border-radius: 20px;
    background: var(--vc);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    flex-shrink: 0;
    position: relative;
  }
  
  .grade-badge::after {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 16px;
    pointer-events: none;
  }
  
  .grade-letter {
    font-family: 'Instrument Serif', serif;
    font-weight: 600;
    font-size: 42px;
    line-height: 1;
    font-style: italic;
  }
  
  .grade-score {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    opacity: 0.85;
    margin-top: 2px;
    letter-spacing: 0.1em;
  }
  
  .verdict-text {
    flex: 1;
  }
  
  .verdict-title {
    font-family: 'Instrument Serif', serif;
    font-size: 26px;
    line-height: 1;
    margin-bottom: 8px;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  
  .verdict-desc {
    font-size: 13px;
    color: var(--text-2);
    line-height: 1.45;
  }
  
  /* SCORE BREAKDOWN BAR */
  .score-bar-wrap {
    margin-top: 24px;
    position: relative;
  }
  
  .score-bar {
    height: 8px;
    background: var(--bg-3);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    display: flex;
    border: 1px solid var(--border);
  }
  
  .score-bar-seg {
    flex: 1;
    height: 100%;
  }
  
  .score-bar-seg.s1 { background: var(--grade-e); opacity: 0.7; }
  .score-bar-seg.s2 { background: var(--grade-d); opacity: 0.7; }
  .score-bar-seg.s3 { background: var(--grade-c); opacity: 0.7; }
  .score-bar-seg.s4 { background: var(--grade-b); opacity: 0.7; }
  .score-bar-seg.s5 { background: var(--grade-a); opacity: 0.7; }
  
  .score-marker {
    position: absolute;
    top: -5px;
    width: 4px;
    height: 18px;
    background: var(--text);
    border-radius: 2px;
    transform: translateX(-50%);
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    border: 1px solid var(--bg-2);
  }
  
  .score-bar-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-3);
    letter-spacing: 0.05em;
  }
  
  /* CARDS */
  .card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 22px;
    margin-bottom: 14px;
    box-shadow: var(--shadow-sm);
  }
  
  .card-head {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
  }
  
  .card-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--bg-3);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }
  
  .card-title {
    font-family: 'Instrument Serif', serif;
    font-size: 19px;
    flex: 1;
    letter-spacing: -0.01em;
  }
  
  .card-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-3);
    background: var(--bg-3);
    border: 1px solid var(--border);
    padding: 4px 8px;
    border-radius: 6px;
    letter-spacing: 0.1em;
  }
  
  /* NUTRITION GRID */
  .nutri-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  
  .nutri-cell {
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    border-left: 3px solid var(--nc);
  }
  
  .nutri-cell-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 6px;
  }
  
  .nutri-cell-val {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    font-weight: 500;
    line-height: 1;
  }
  
  .nutri-cell-unit {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-2);
    margin-left: 3px;
  }
  
  .nutri-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    color: var(--nc);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 6px;
  }
  
  /* WARNINGS */
  .warn-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  
  .warn {
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    border-left: 3px solid var(--wc);
  }
  
  .warn-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  
  .warn-name {
    font-weight: 600;
    font-size: 14px;
    text-transform: capitalize;
  }
  
  .warn-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    background: var(--wc);
    color: white;
    padding: 3px 7px;
    border-radius: 5px;
    flex-shrink: 0;
  }
  
  .warn-desc {
    font-size: 12px;
    color: var(--text-2);
    line-height: 1.45;
  }
  
  .all-clear {
    text-align: center;
    padding: 24px;
    background: var(--bg-3);
    border-radius: 14px;
    border: 1px dashed rgba(22,163,74,0.3);
  }
  
  .all-clear-icon {
    width: 44px;
    height: 44px;
    background: var(--grade-a);
    border-radius: 50%;
    margin: 0 auto 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 20px;
    font-weight: 700;
  }
  
  .all-clear-text {
    color: var(--grade-a);
    font-size: 13px;
    font-weight: 600;
  }
  
  /* INGREDIENTS */
  .ingr-text {
    font-size: 12.5px;
    line-height: 1.65;
    color: var(--text);
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    max-height: 220px;
    overflow-y: auto;
    font-family: 'JetBrains Mono', monospace;
  }
  
  /* ADDITIVES DETAIL */
  .additives-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  
  .additive {
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 14px 14px 16px;
    border-left: 3px solid var(--ac);
    position: relative;
    overflow: hidden;
  }
  
  .additive::before {
    content: '';
    position: absolute;
    top: 0;
    right: 0;
    width: 80px;
    height: 80px;
    background: radial-gradient(circle at top right, var(--ac), transparent 70%);
    opacity: 0.06;

  /* ANALYSIS POINTS */

  /* LOADING */
  .loading {

    inset: 0;

    gap: 24px;
    z-index: 200;

  .loading.active { display: flex; }
  
  .lab-loader {
    width: 70px;
    height: 70px;
    position: relative;
  }
  
  .lab-loader::before {
    content: '';
    position: absolute;
    inset: 0;
    border: 1.5px solid var(--border-2);
    border-radius: 50%;
  }
  
  .lab-loader::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 1.5px solid transparent;
    border-top-color: var(--signal);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  
  .lab-loader-dot {
    position: absolute;
    inset: 0;
    margin: auto;

  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ============== SCÈNE FORÊT EN BAS ============== */
  .forest-scene {
    position: relative;
    margin: 50px -24px 0;
    height: 130px;
    pointer-events: none;
  }
  
  .forest-hill {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    width: 100%;
    height: 80px;
    z-index: 1;
  }
  
  .forest-tree {
    position: absolute;
    bottom: 25px;
    z-index: 3;
    animation: treeSway 6s ease-in-out infinite;
    transform-origin: bottom center;
  }
  
  .forest-tree.t1 {
    left: 16%;
    width: 50px;
    height: 75px;
    animation-delay: 0s;
  }
  
  .forest-tree.t2 {
    left: 46%;
    transform-origin: bottom center;
    width: 70px;
    height: 100px;
    bottom: 28px;
    animation-delay: 1.5s;
    z-index: 4;
  }
  
  .forest-tree.t3 {
    right: 18%;
    width: 46px;
    height: 70px;
    animation-delay: 3s;
  }
  
  .forest-tree svg {
    width: 100%;
    height: 100%;
    display: block;
    filter: drop-shadow(0 4px 6px rgba(85,168,69,0.15));
  }
  
  @keyframes treeSway {
    0%, 100% { transform: rotate(-1.5deg); }
    50% { transform: rotate(1.5deg); }
  }
  
  .forest-bush {
    position: absolute;
    bottom: 18px;
    z-index: 2;
  }
  
  .forest-bush.b1 {
    left: 4%;
    width: 50px;
    height: 30px;
  }
  
  .forest-bush.b2 {
    right: 4%;
    width: 44px;
    height: 28px;
  }
  
  .forest-bush svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  
  .forest-mushroom {
    position: absolute;
    bottom: 24px;
    z-index: 3;
  }
  
  .forest-mushroom.m1 {
    left: 32%;
    width: 18px;
    height: 22px;
  }
  
  .forest-mushroom svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  
  .forest-sun {
    position: absolute;
    top: 0;
    right: 30px;
    width: 36px;
    height: 36px;
    z-index: 1;
    animation: sunPulse 4s ease-in-out infinite;
  }
  
  .forest-sun svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  
  @keyframes sunPulse {
    0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.85; }
    50% { transform: scale(1.1) rotate(20deg); opacity: 1; }
  }
  
  .forest-quote {
    position: absolute;
    bottom: -8px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--signal);
    z-index: 5;
    padding: 6px 12px;
  }

  }

<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.0/umd/index.min.js"></script>
<script>
// ============== STATE ==============
let zxingReader = null;
let zxingControls = null;
let history = [];
const MAX_HISTORY = 30;

// ============== STORAGE ==============
async function loadHistory() {
  try {
    if (window.storage) {
      const r = await window.storage.get('wsa_history');
      if (r && r.value) history = JSON.parse(r.value);
    } else {
      const stored = localStorage.getItem('wsa_history');
      if (stored) history = JSON.parse(stored);
    }
  } catch (e) {
    history = [];
  }
  renderHistory();
}

async function saveHistory() {
  try {
    if (window.storage) {
      await window.storage.set('wsa_history', JSON.stringify(history));
    } else {
      localStorage.setItem('wsa_history', JSON.stringify(history));
    }
  } catch (e) { console.warn(e); }
}

function addHistory(p) {
  history = history.filter(x => x.code !== p.code);
  history.unshift({
    code: p.code,
    name: p.name,
    brand: p.brand,
    image: p.image,
    score: p.score,
    grade: p.grade,
    color: p.color,
    type: p.type,
    ts: Date.now()
  });
  if (history.length > MAX_HISTORY) history = history.slice(0, MAX_HISTORY);
  saveHistory();
  renderHistory();
}

function renderHistory() {
  const area = document.getElementById('history-area');
  const count = document.getElementById('history-count');
  count.textContent = history.length > 0 ? history.length + (history.length > 1 ? ' produits' : ' produit') : '';
  if (!history.length) {
    area.innerHTML = '<div class="empty"><span class="empty-icon">📦</span>Aucun produit scanné</div>';
    return;
  }
  area.innerHTML = '<div class="history-list">' + history.map(p => {
    const img = p.image
      ? `<img src="${escapeAttr(p.image)}" class="history-img" onerror="this.outerHTML='<div class=&quot;history-img history-img-ph&quot;>📦</div>'">`
      : '<div class="history-img history-img-ph">📦</div>';
    const noteOn20 = (p.score / 5);
    const noteFmt = noteOn20 % 1 === 0 ? noteOn20.toFixed(0) : noteOn20.toFixed(1);
    return `
      <div class="history-item" onclick="lookupProduct('${escapeAttr(p.code)}')">
        ${img}
        <div class="history-info">
          <div class="history-name">${escapeHtml(p.name)}</div>
          <div class="history-meta">${escapeHtml(p.brand || getCategoryLabel(p.type))}</div>
        </div>
        <div class="history-grade">
          <span class="hg-num">${noteFmt}</span>
          <span class="hg-max">/20</span>
          <span class="hg-dot" style="background:${p.color}"></span>
        </div>
      </div>
    `;
  }).join('') + '</div>';
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function escapeAttr(s) {
  if (s == null) return '';
  return String(s).replace(/['"<>&]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ============== TOAST ==============
function showToast(msg, opts = {}) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (opts.error ? ' error' : '');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('show'), opts.duration || 3000);
}

// ============== SCANNER (ZXing - copie exacte d'index1) ==============
async function startScanner() {
  const scanner = document.getElementById('scanner');
  const statusEl = document.getElementById('scan-status-text');
  const video = document.getElementById('scanner-video');
  
  scanner.classList.add('active');
  statusEl.textContent = 'Initialisation caméra…';
  
  try {
    const ZX = window.ZXing || window.ZXingBrowser;
    
    if (!ZX) {
      stopScanner();
      showToast('Scanner indisponible. Utilise la saisie manuelle.', { error: true });
      return;
    }
    
    // S'assurer qu'aucun scan précédent n'est actif
    stopScannerInternal();
    
    zxingReader = new ZX.BrowserMultiFormatReader();
    
    zxingControls = await zxingReader.decodeFromConstraints(
      {
        audio: false,
        video: {
          facingMode: { ideal: 'environment' },
          width: { ideal: 1280 },
          height: { ideal: 720 }
        }
      },
      video,
      (result, err) => {
        if (result) {
          const code = result.getText();
          statusEl.textContent = '✅ Code détecté : ' + code;
          stopScannerInternal();
          
          setTimeout(() => {
            scanner.classList.remove('active');
            lookupProduct(code);
          }, 300);
        }
      }
    );
    
    statusEl.textContent = 'Recherche du code-barres…';
    
  } catch (e) {
    console.error('Scanner error:', e);
    stopScanner();
    
    let msg = 'Accès caméra impossible. Vérifie Safari + HTTPS, ou utilise la saisie manuelle.';
    const errStr = (e.message || e.toString() || '').toLowerCase();
    if (e.name === 'NotAllowedError' || /not allowed|permission|denied/i.test(errStr)) {
      msg = 'Accès caméra refusé. Autorise dans les réglages, puis recharge la page.';
    } else if (e.name === 'NotFoundError' || /not found|no camera/i.test(errStr)) {
      msg = 'Aucune caméra détectée sur cet appareil.';
    }
    showToast(msg, { error: true, duration: 5000 });
  }
}

function stopScannerInternal() {
  if (zxingControls) {
    try { zxingControls.stop(); } catch(e) {}
    zxingControls = null;
  }
  if (zxingReader) {
    try { zxingReader.reset(); } catch(e) {}
    zxingReader = null;
  }
}

function stopScanner() {
  stopScannerInternal();
  document.getElementById('scanner').classList.remove('active');
}

// ============== MANUAL ==============
function manualSearch() {
  const input = document.getElementById('manual-code');
  const code = input.value.trim();
  if (!code) {
    showToast('Entre un code-barres');
    return;
  }
  if (!/^\d{6,14}$/.test(code)) {
    showToast('Code invalide (6 à 14 chiffres attendus)', { error: true });
    return;
  }
  input.value = '';
  lookupProduct(code);
}

// ============== API LOOKUPS ==============
async function lookupProduct(code) {
  const loading = document.getElementById('loading');
  loading.classList.add('active');
  
  const sources = [
    { url: `https://world.openfoodfacts.org/api/v2/product/${code}.json`, type: 'food' },
    { url: `https://world.openbeautyfacts.org/api/v2/product/${code}.json`, type: 'beauty' },
    { url: `https://world.openproductsfacts.org/api/v2/product/${code}.json`, type: 'product' }
  ];
  
  let lastError = null;
  
  for (const src of sources) {
    try {
      const product = await fetchSource(src.url, src.type);
      if (product) {
        loading.classList.remove('active');
        showResult(product);
        return;
      }
    } catch (e) {
      lastError = e;
    }
  }
  
  loading.classList.remove('active');
  if (lastError) {
    showToast('Erreur réseau : impossible de joindre les bases. Vérifie ta connexion.', { error: true, duration: 4000 });
  } else {
    showToast('Produit "' + code + '" introuvable dans les bases ouvertes', { error: true, duration: 4000 });
  }
}

async function fetchSource(url, type) {
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 8000);
  
  try {
    const res = await fetch(url, { signal: controller.signal });
    clearTimeout(timeoutId);
    if (!res.ok) return null;
    const data = await res.json();
    if (data.status !== 1 || !data.product) return null;
    return parseProduct(data.product, type);
  } catch (e) {
    clearTimeout(timeoutId);
    if (e.name === 'AbortError') throw new Error('Timeout');
    throw e;
  }
}

// ============== PARSING ==============
function getCategoryLabel(type) {
  return { food: 'Alimentaire', beauty: 'Cosmétique', product: 'Ménager / Autre' }[type] || 'Produit';
}

function parseProduct(p, type) {
  const product = {
    code: p.code || '',
    name: p.product_name_fr || p.product_name || p.generic_name_fr || p.generic_name || 'Produit sans nom',
    brand: p.brands || '',
    image: p.image_front_url || p.image_url || null,
    type: type,
    category: getCategoryLabel(type),
    quantity: p.quantity || '',
    ingredients_text: p.ingredients_text_fr || p.ingredients_text || '',
    nutriments: p.nutriments || {},
    nutriscore_grade: (p.nutriscore_grade || '').toLowerCase(),
    nova_group: p.nova_group,
    ecoscore_grade: (p.ecoscore_grade || '').toLowerCase(),
    additives_tags: p.additives_tags || [],
    allergens_tags: p.allergens_tags || [],
    labels_tags: p.labels_tags || [],
    categories: p.categories || '',
    countries: p.countries || ''
  };
  
  const scoreData = (type === 'food') ? computeFoodScore(p) : computeIngredientScore(p);
  Object.assign(product, scoreData);
  
  return product;
}

// ============== SCORING ==============
function computeFoodScore(p) {
  let score = 50;
  const points = [];
  
  const grade = (p.nutriscore_grade || '').toLowerCase();
  const nutriMap = { a: 92, b: 78, c: 60, d: 38, e: 18 };
  if (nutriMap[grade] !== undefined) {
    score = nutriMap[grade];
    points.push({ type: grade <= 'b' ? 'pos' : grade === 'c' ? 'neu' : 'neg', text: 'Nutri-Score officiel : ' + grade.toUpperCase(), small: 'Algorithme Santé Publique France' });
  } else {
    points.push({ type: 'neu', text: 'Nutri-Score non disponible', small: 'Évaluation basée sur composition' });
  }
  
  const nova = parseInt(p.nova_group);
  if (nova === 4) {
    score -= 12;
    points.push({ type: 'neg', text: 'Aliment ultra-transformé (NOVA 4)', small: 'Industrialisation maximale' });
  } else if (nova === 3) {
    score -= 5;
    points.push({ type: 'neu', text: 'Aliment transformé (NOVA 3)', small: 'Transformation modérée' });
  } else if (nova === 2) {
    points.push({ type: 'neu', text: 'Ingrédient culinaire transformé (NOVA 2)', small: 'Sucre, huile, sel…' });
  } else if (nova === 1) {
    score += 5;
    points.push({ type: 'pos', text: 'Aliment peu/pas transformé (NOVA 1)', small: 'Naturel' });
  }
  
  const additivesCount = (p.additives_tags || []).length;
  if (additivesCount > 5) {
    score -= 10;
    points.push({ type: 'neg', text: additivesCount + ' additifs détectés', small: 'Forte présence' });
  } else if (additivesCount > 2) {
    score -= 5;
    points.push({ type: 'neu', text: additivesCount + ' additifs détectés', small: 'Présence modérée' });
  } else if (additivesCount > 0) {
    points.push({ type: 'neu', text: additivesCount + ' additif(s) détecté(s)', small: 'Présence faible' });
  } else {
    points.push({ type: 'pos', text: 'Aucun additif déclaré', small: 'Composition simple' });
  }
  
  const labels = (p.labels_tags || []).join(' ');
  if (/bio|organic/i.test(labels)) {
    score += 4;
    points.push({ type: 'pos', text: 'Produit biologique certifié', small: 'Label bio' });
  }
  if (/fair[\s-]?trade|equitable/i.test(labels)) {
    score += 2;
    points.push({ type: 'pos', text: 'Commerce équitable', small: 'Engagement éthique' });
  }
  
  if (p.ecoscore_grade) {
    const eco = p.ecoscore_grade.toLowerCase();
    if (eco === 'a' || eco === 'b') {
      points.push({ type: 'pos', text: 'Eco-Score : ' + eco.toUpperCase(), small: 'Faible impact environnemental' });
    } else if (eco === 'd' || eco === 'e') {
      points.push({ type: 'neg', text: 'Eco-Score : ' + eco.toUpperCase(), small: 'Impact environnemental élevé' });
    }
  }
  
  score = Math.max(0, Math.min(100, Math.round(score)));
  return { ...formatScore(score), points };
}

function computeIngredientScore(p) {
  const ingredients = (p.ingredients_text_fr || p.ingredients_text || '').toLowerCase();
  const points = [];
  
  if (!ingredients) {
    points.push({ type: 'neu', text: 'Liste d\'ingrédients non disponible', small: 'Évaluation limitée' });
    return { ...formatScore(50), points };
  }
  
  let score = 92;
  let high = 0, medium = 0, low = 0;
  
  WORRYING_INGREDIENTS.forEach(ing => {
    const re = new RegExp('\\b' + escapeRegex(ing.match.toLowerCase()) + '\\b', 'i');
    if (re.test(ingredients)) {
      if (ing.severity === 'high') { score -= 16; high++; }
      else if (ing.severity === 'medium') { score -= 8; medium++; }
      else { score -= 4; low++; }
    }
  });
  
  if (high > 0) points.push({ type: 'neg', text: high + ' ingrédient(s) à risque élevé', small: 'Perturbateurs, allergènes majeurs' });
  if (medium > 0) points.push({ type: 'neg', text: medium + ' ingrédient(s) à risque modéré', small: 'Composés controversés' });
  if (low > 0) points.push({ type: 'neu', text: low + ' ingrédient(s) à risque faible', small: 'Présence à surveiller' });
  if (high + medium + low === 0) points.push({ type: 'pos', text: 'Aucun ingrédient préoccupant détecté', small: 'Composition saine' });
  
  const labels = (p.labels_tags || []).join(' ');
  if (/bio|organic|naturel/i.test(labels)) {
    score += 3;
    points.push({ type: 'pos', text: 'Certifié biologique / naturel', small: 'Label vérifié' });
  }
  if (/cruelty[\s-]?free|sans test/i.test(labels)) {
    points.push({ type: 'pos', text: 'Non testé sur animaux', small: 'Éthique' });
  }
  if (/vegan/i.test(labels)) {
    points.push({ type: 'pos', text: 'Formulation vegan', small: 'Sans ingrédients animaux' });
  }
  
  score = Math.max(0, Math.min(100, Math.round(score)));
  return { ...formatScore(score), points };
}

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function formatScore(score) {
  let color, grade, verdict, desc;
  if (score >= 85) {
    color = '#15803d'; grade = 'A'; verdict = 'Excellent';
    desc = 'Composition de très haute qualité, recommandé sans réserve.';
  } else if (score >= 65) {
    color = '#65a30d'; grade = 'B'; verdict = 'Bon';
    desc = 'Bonne composition globale, peu de points négatifs.';
  } else if (score >= 45) {
    color = '#ca8a04'; grade = 'C'; verdict = 'Médiocre';
    desc = 'Composition moyenne, à consommer avec modération.';
  } else if (score >= 25) {
    color = '#ea580c'; grade = 'D'; verdict = 'Mauvais';
    desc = 'Plusieurs points problématiques identifiés.';
  } else {
    color = '#b91c1c'; grade = 'E'; verdict = 'À éviter';
    desc = 'Composition très problématique, fortement déconseillé.';
  }
  return { score, color, grade, verdict, desc };
}

function findWarnings(product) {
  const text = (product.ingredients_text || '').toLowerCase();
  const additives = (product.additives_tags || []).join(' ').toLowerCase();
  const found = [];
  const seen = new Set();
  
  WORRYING_INGREDIENTS.forEach(ing => {
    const key = ing.match;
    if (seen.has(key)) return;
    const re = new RegExp('\\b' + escapeRegex(ing.match.toLowerCase()) + '\\b', 'i');
    if (re.test(text) || re.test(additives)) {
      seen.add(key);
      found.push(ing);
    }
  });
  
  return found.sort((a, b) => {
    const order = { high: 0, medium: 1, low: 2 };
    return order[a.severity] - order[b.severity];
  });
}

function findAdditives(product) {
  const text = (product.ingredients_text || '').toLowerCase();
  const additivesTags = (product.additives_tags || []);
  const found = [];
  const seen = new Set();
  
  // 1. Depuis les tags additives_tags d'OpenFoodFacts (format "en:e150d")
  additivesTags.forEach(tag => {
    const match = tag.match(/e\d+[a-z]?/i);
    if (match) {
      const code = match[0].toLowerCase();
      if (!seen.has(code) && ADDITIVES_DB[code]) {
        seen.add(code);
        found.push({ code, ...ADDITIVES_DB[code] });
      }
    }
  });
  
  // 2. Recherche de codes E directement dans le texte
  const eCodeMatches = text.matchAll(/\be(\d{3,4}[a-z]?)\b/gi);
  for (const m of eCodeMatches) {
    const code = ('e' + m[1]).toLowerCase();
    if (!seen.has(code) && ADDITIVES_DB[code]) {
      seen.add(code);
      found.push({ code, ...ADDITIVES_DB[code] });
    }
  }
  
  // 3. Recherche par nom d'additif
  Object.keys(ADDITIVE_NAME_TO_CODE).forEach(name => {
    const code = ADDITIVE_NAME_TO_CODE[name];
    if (seen.has(code)) return;
    const re = new RegExp('\\b' + escapeRegex(name) + '\\b', 'i');
    if (re.test(text)) {
      seen.add(code);
      if (ADDITIVES_DB[code]) {
        found.push({ code, ...ADDITIVES_DB[code] });
      }
    }
  });
  
  // Tri : par risque décroissant
  const riskOrder = { high: 0, medium: 1, low: 2, safe: 3 };
  return found.sort((a, b) => riskOrder[a.risk] - riskOrder[b.risk]);
}

function getRiskColor(risk) {
  return {
    high: '#ef4444',
    medium: '#f97316',
    low: '#eab308',
    safe: '#22c55e'
  }[risk] || '#71717a';
}

function getRiskLabel(risk) {
  return {
    high: 'Risque élevé',
    medium: 'Modéré',
    low: 'Faible',
    safe: 'Sans risque'
  }[risk] || 'Inconnu';
}

// ============== RESULT DISPLAY ==============
function showResult(product) {
  addHistory(product);
  const body = document.getElementById('result-body');
  
  const noteOn20 = (product.score / 5);
  const noteFmt = noteOn20 % 1 === 0 ? noteOn20.toFixed(0) : noteOn20.toFixed(1);
  
  let html = '';
  
  // === HEADER (image + nom + marque + note compacte) ===
  html += `
    <div class="yk-header" style="--vc:${product.color}">
      ${product.image
        ? `<img src="${escapeAttr(product.image)}" class="yk-img" onerror="this.outerHTML='<div class=&quot;yk-img-ph&quot;>📦</div>'">`
        : '<div class="yk-img-ph">📦</div>'}
      <div class="yk-meta">
        <div class="yk-name">${escapeHtml(product.name)}</div>
        ${product.brand ? `<div class="yk-brand">${escapeHtml(product.brand)}</div>` : ''}
        <div class="yk-note-row">
          <span class="yk-note-dot"></span>
          <span class="yk-note-val">${noteFmt}/20</span>
          <span class="yk-note-verdict">${product.verdict}</span>
        </div>
      </div>
    </div>
  `;
  
  // === TABS Santé / Environnement ===
  html += `
    <div class="yk-tabs">
      <button class="yk-tab active" type="button">Santé</button>
      <button class="yk-tab" type="button" style="opacity:0.6">Environnement</button>
    </div>
  `;
  
  // === ANALYSE : préparer les défauts et qualités ===
  const flaws = []; // mauvais/médiocres
  const qualities = []; // bons
  
  // -- Additifs --
  const additives = findAdditives(product);
  if (additives.length > 0) {
    const high = additives.filter(a => a.risk === 'high').length;
    const med = additives.filter(a => a.risk === 'medium').length;
    const lowSafe = additives.filter(a => a.risk === 'low' || a.risk === 'safe').length;
    
    let dotColor, sub;
    if (high > 0) {
      dotColor = 'red';
      sub = high > 1 ? `${high} additifs à risque élevé` : 'Un additif à risque élevé';
    } else if (med > 0) {
      dotColor = 'orange';
      sub = med > 1 ? `${med} additifs à risque modéré` : 'Un additif à risque modéré';
    } else if (lowSafe > 0) {
      dotColor = lowSafe > 2 ? 'yellow' : 'lightgreen';
      sub = 'Quelques additifs à risque limité';
    }
    
    if (high > 0 || med > 0) {
      flaws.push({
        icon: iconMolecule(),
        name: 'Additifs',
        sub: sub,
        value: additives.length.toString(),
        dot: dotColor,
        detail: renderAdditivesDetail(additives)
      });
    } else if (lowSafe > 0) {
      qualities.push({
        icon: iconMolecule(),
        name: 'Additifs',
        sub: 'Composition propre',
        value: additives.length.toString(),
        dot: 'green',
        detail: renderAdditivesDetail(additives)
      });
    }
  } else if (product.type === 'food') {
    qualities.push({
      icon: iconMolecule(),
      name: 'Additifs',
      sub: 'Aucun additif détecté',
      value: '0',
      dot: 'green',
      detail: '<strong>Excellent.</strong> Aucun additif n\'a été identifié dans la liste des ingrédients.'
    });
  }
  
  // -- Nutriments (food only) --
  if (product.type === 'food' && product.nutriments) {
    const n = product.nutriments;
    
    addNutri(flaws, qualities, {
      icon: iconSalt(),
      name: 'Sel',
      value: n.salt_100g, unit: 'g',
      good: 0.3, bad: 1.5,
      labels: { red: 'Trop salé', orange: 'Un peu trop salé', yellow: 'Sel modéré', green: 'Peu salé' },
      explain: 'Une consommation excessive de sel augmente le risque d\'hypertension et de maladies cardiovasculaires. L\'OMS recommande moins de 5g par jour.'
    });
    
    addNutri(flaws, qualities, {
      icon: iconFlame(),
      name: 'Calories',
      value: n['energy-kcal_100g'], unit: 'kcal',
      good: 100, bad: 350,
      labels: { red: 'Très calorique', orange: 'Un peu trop calorique', yellow: 'Calories modérées', green: 'Peu calorique' },
      explain: 'L\'apport calorique influe directement sur le poids et la santé métabolique. À mettre en perspective avec la portion consommée.'
    });
    
    addNutri(flaws, qualities, {
      icon: iconDrop(),
      name: 'Graisses saturées',
      value: n['saturated-fat_100g'], unit: 'g',
      good: 1.5, bad: 5,
      labels: { red: 'Trop gras', orange: 'Un peu trop gras', yellow: 'Modéré', green: 'Peu de saturés' },
      explain: 'Les graisses saturées en excès augmentent le mauvais cholestérol et le risque cardiovasculaire. À limiter à 20g par jour environ.'
    });
    
    addNutri(flaws, qualities, {
      icon: iconCube(),
      name: 'Sucre',
      value: n.sugars_100g, unit: 'g',
      good: 5, bad: 15,
      labels: { red: 'Trop sucré', orange: 'Un peu trop sucré', yellow: 'Sucre modéré', green: 'Peu de sucre' },
      explain: 'Un excès de sucre est lié au diabète, à l\'obésité et aux caries. L\'OMS recommande moins de 25g de sucres ajoutés par jour.'
    });
    
    // QUALITÉS uniquement
    addNutri(flaws, qualities, {
      icon: iconFish(),
      name: 'Protéines',
      value: n.proteins_100g, unit: 'g',
      good: 8, bad: 0, inverse: true,
      labels: { green: 'Bon apport en protéines', lightgreen: 'Quelques protéines', gray: 'Peu de protéines' },
      explain: 'Les protéines sont essentielles à la construction musculaire et au métabolisme. Apport recommandé : ~50g par jour.'
    }, true);
    
    addNutri(flaws, qualities, {
      icon: iconWheat(),
      name: 'Fibres',
      value: n.fiber_100g, unit: 'g',
      good: 6, bad: 0, inverse: true,
      labels: { green: 'Riche en fibres', lightgreen: 'Quelques fibres', gray: 'Peu de fibres' },
      explain: 'Les fibres améliorent la digestion et le microbiote intestinal. L\'apport recommandé est de 25-30g par jour.'
    }, true);
    
    addNutri(flaws, qualities, {
      icon: iconLeaf(),
      name: 'Fruits / légumes',
      value: n['fruits-vegetables-nuts-estimate-from-ingredients_100g'], unit: '%',
      good: 40, bad: 0, inverse: true,
      labels: { green: 'Riche en fruits / légumes', lightgreen: 'Quelques fruits / légumes', gray: 'Peu de fruits / légumes' },
      explain: 'Une part élevée de fruits, légumes ou noix est un excellent indicateur de qualité nutritionnelle.'
    }, true);
  }
  
  // -- Ingrédients à risque (cosmétique / ménager) --
  if (product.type !== 'food') {
    const warnings = findWarnings(product);
    if (warnings.length > 0) {
      const high = warnings.filter(w => w.severity === 'high').length;
      const med = warnings.filter(w => w.severity === 'medium').length;
      
      let dot, sub;
      if (high > 0) { dot = 'red'; sub = high > 1 ? `${high} ingrédients à risque élevé` : 'Un ingrédient à risque élevé'; }
      else if (med > 0) { dot = 'orange'; sub = med > 1 ? `${med} ingrédients à risque modéré` : 'Un ingrédient à risque modéré'; }
      else { dot = 'yellow'; sub = 'Quelques ingrédients à surveiller'; }
      
      flaws.push({
        icon: iconAlert(),
        name: 'Ingrédients à risque',
        sub: sub,
        value: warnings.length.toString(),
        dot: dot,
        detail: renderWarningsDetail(warnings)
      });
    } else if (product.ingredients_text) {
      qualities.push({
        icon: iconAlert(),
        name: 'Ingrédients',
        sub: 'Composition saine',
        value: '0',
        dot: 'green',
        detail: '<strong>Excellent.</strong> Aucun ingrédient préoccupant n\'a été détecté.'
      });
    }
  }
  
  // -- Transformation NOVA --
  if (product.type === 'food' && product.nova_group) {
    const nova = parseInt(product.nova_group);
    if (nova === 4) {
      flaws.push({
        icon: iconFactory(),
        name: 'Transformation',
        sub: 'Aliment ultra-transformé',
        value: 'NOVA 4',
        dot: 'red',
        detail: '<strong>NOVA 4 — Ultra-transformé.</strong> Ce produit a subi de multiples transformations industrielles et contient typiquement des additifs cosmétiques (arômes, colorants, émulsifiants). Une consommation régulière est associée à des risques accrus de maladies chroniques.'
      });
    } else if (nova === 3) {
      flaws.push({
        icon: iconFactory(),
        name: 'Transformation',
        sub: 'Aliment transformé',
        value: 'NOVA 3',
        dot: 'yellow',
        detail: '<strong>NOVA 3 — Transformé.</strong> Procédé de transformation modéré (cuisson, fermentation, ajout de sel, sucre ou matière grasse). À consommer avec modération.'
      });
    } else if (nova === 1) {
      qualities.push({
        icon: iconFactory(),
        name: 'Transformation',
        sub: 'Aliment peu ou pas transformé',
        value: 'NOVA 1',
        dot: 'green',
        detail: '<strong>NOVA 1 — Naturel.</strong> Aliment peu ou pas transformé. C\'est le meilleur niveau possible : un excellent choix pour la santé.'
      });
    } else if (nova === 2) {
      qualities.push({
        icon: iconFactory(),
        name: 'Transformation',
        sub: 'Ingrédient culinaire',
        value: 'NOVA 2',
        dot: 'lightgreen',
        detail: '<strong>NOVA 2 — Ingrédient culinaire transformé.</strong> Sucre, huile, sel, beurre… Ingrédients de base utilisés en cuisine. Sans risque en quantité raisonnable.'
      });
    }
  }
  
  // -- Labels positifs (bio, etc.) --
  const labels = (product.labels_tags || []).join(' ');
  if (/\b(bio|organic)\b/i.test(labels)) {
    qualities.push({
      icon: iconLeaf(),
      name: 'Bio',
      sub: 'Produit biologique certifié',
      value: '✓',
      dot: 'green',
      detail: '<strong>Label bio.</strong> Ce produit respecte le cahier des charges de l\'agriculture biologique : sans pesticides de synthèse, sans OGM, et respectueux de l\'environnement.'
    });
  }
  
  // === RENDU des sections ===
  if (flaws.length > 0) {
    html += `
      <div class="yk-section-head">
        <div class="yk-section-title">Défauts</div>
        ${product.type === 'food' ? '<div class="yk-section-unit">pour 100g</div>' : ''}
      </div>
      <div class="yk-list">
        ${flaws.map((row, i) => renderYkRow(row, 'f' + i)).join('')}
      </div>
    `;
  }
  
  if (qualities.length > 0) {
    html += `
      <div class="yk-section-head">
        <div class="yk-section-title">Qualités</div>
        ${product.type === 'food' ? '<div class="yk-section-unit">pour 100g</div>' : ''}
      </div>
      <div class="yk-list">
        ${qualities.map((row, i) => renderYkRow(row, 'q' + i)).join('')}
      </div>
    `;
  }
  
  if (flaws.length === 0 && qualities.length === 0) {
    // Fallback : afficher au moins la note
    html += `
      <div class="yk-big-note" style="--vc:${product.color}">
        <div class="yk-big-note-label">Note globale</div>
        <div><span class="yk-big-note-val">${noteFmt}</span><span class="yk-big-note-max">/20</span></div>
        <div class="yk-big-note-verdict">${product.verdict}</div>
      </div>
      <div class="empty">Données insuffisantes pour une analyse détaillée de ce produit.</div>
    `;
  }
  
  // === LISTE COMPLÈTE D'INGRÉDIENTS ===
  if (product.ingredients_text) {
    html += `
      <div class="yk-ingr-block">
        <div class="yk-ingr-title">Liste des ingrédients</div>
        <div class="yk-ingr-text">${escapeHtml(product.ingredients_text)}</div>
      </div>
    `;
  }
  
  // === Footer petit ===
  html += `
    <div style="text-align:center;margin-top:32px;padding:16px;font-family:'JetBrains Mono',monospace;font-size:9px;color:#a1a1aa;text-transform:uppercase;letter-spacing:0.15em">
      Code-barres ${escapeHtml(product.code)}<br>
      Données : Open Food / Beauty / Products Facts
    </div>
  `;
  
  body.innerHTML = html;
  body.scrollTop = 0;
  document.getElementById('result').classList.add('active');
  
  // Activer les accordéons
  body.querySelectorAll('.yk-row').forEach(row => {
    row.addEventListener('click', () => row.classList.toggle('expanded'));
  });
}

// ============== HELPERS RENDU YUKA ==============
function renderYkRow(row, id) {
  return `
    <div class="yk-row" data-id="${id}">
      <div class="yk-row-icon">${row.icon}</div>
      <div class="yk-row-text">
        <div class="yk-row-name">${escapeHtml(row.name)}</div>
        <div class="yk-row-sub">${escapeHtml(row.sub)}</div>
      </div>
      <div class="yk-row-end">
        <span class="yk-row-val">${row.value}</span>
        <span class="yk-row-dot ${row.dot}"></span>
        <svg class="yk-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>
    <div class="yk-row-detail">
      <div class="yk-row-detail-inner">
        <div class="yk-row-detail-content">${row.detail || ''}</div>
      </div>
    </div>
  `;
}

function addNutri(flaws, qualities, opts, qualityOnly) {
  if (opts.value === undefined || opts.value === null) return;
  const v = parseFloat(opts.value);
  if (isNaN(v)) return;
  
  let dot, label;
  if (opts.inverse) {
    if (v >= opts.good) { dot = 'green'; label = opts.labels.green; }
    else if (v >= opts.good * 0.5) { dot = 'lightgreen'; label = opts.labels.lightgreen || opts.labels.green; }
    else { dot = 'gray'; label = opts.labels.gray || 'Faible apport'; }
  } else {
    if (v >= opts.bad) { dot = 'red'; label = opts.labels.red; }
    else if (v >= opts.bad * 0.65) { dot = 'orange'; label = opts.labels.orange || opts.labels.red; }
    else if (v >= opts.good) { dot = 'yellow'; label = opts.labels.yellow || opts.labels.orange; }
    else { dot = 'green'; label = opts.labels.green; }
  }
  
  const isFlaw = ['red', 'orange', 'yellow'].includes(dot);
  const target = qualityOnly ? qualities : (isFlaw ? flaws : qualities);
  
  target.push({
    icon: opts.icon,
    name: opts.name,
    sub: label,
    value: v.toFixed(1) + (opts.unit === '%' ? '%' : ' ' + opts.unit),
    dot: dot,
    detail: opts.explain || ''
  });
}

function renderAdditivesDetail(additives) {
  const sorted = additives.slice(0, 8);
  return sorted.map(a => {
    const ac = getRiskColor(a.risk);
    return `
      <div class="yk-additive-mini" style="--ac:${ac}">
        <div class="yk-additive-mini-head">
          <span class="yk-additive-mini-code" style="color:${ac}">${a.code.toUpperCase()}</span>
          <span class="yk-additive-mini-name">${escapeHtml(a.name)}</span>
        </div>
        <div class="yk-additive-mini-effect">${escapeHtml(a.effects)}</div>
      </div>
    `;
  }).join('');
}

function renderWarningsDetail(warnings) {
  return warnings.slice(0, 6).map(w => {
    const wc = w.severity === 'high' ? '#dc2626' : w.severity === 'medium' ? '#ea580c' : '#ca8a04';
    return `
      <div class="yk-additive-mini" style="--ac:${wc}">
        <div class="yk-additive-mini-head">
          <span class="yk-additive-mini-code" style="color:${wc}">${escapeHtml(w.tag)}</span>
          <span class="yk-additive-mini-name" style="text-transform:capitalize">${escapeHtml(w.match)}</span>
        </div>
        <div class="yk-additive-mini-effect">${escapeHtml(w.desc)}</div>
      </div>
    `;
  }).join('');
}
